on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish artifacts and Docker image for
        required: true
        type: string

name: release
jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    env:
      # Use docker.io for Docker Hub if empty
      REGISTRY: ghcr.io
      # github.repository as <account>/<repo>
      IMAGE_NAME: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
    permissions:
      contents: write
      packages: write
    steps:

    - name: Validate release tag
      run: |
        if [ -z "${RELEASE_TAG}" ]; then
          echo "Release tag is required" >&2
          exit 1
        fi

    - name: Checkout repo
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        ref: ${{ env.RELEASE_TAG }}

    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: ^1.26

    - name: Build binaries
      run: go build -o dnscontrol-extended -ldflags "-s -w"
      env:
        CGO_ENABLED: 0

    - name: Upload dnscontrol-extended
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload "${RELEASE_TAG}" ./dnscontrol-extended#dnscontrol-extended --clobber

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    - name: Log into registry ${{ env.REGISTRY }}
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
          type=raw,value=${{ env.RELEASE_TAG }},enable=${{ env.RELEASE_TAG != '' }}
          
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'}}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
